<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamehub - Bienvenido</title>
    <style>
        /* --- TU CSS ORIGINAL --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #295be2 0%, #e9e7e7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: #fbfbfb;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            max-width: 400px;
            width: 100%;
            /* Añadido para centrar todo el contenido */
            text-align: center; 
        }

        .login-icon {
            text-align: center;
            font-size: 4.5em; /* Un poco más grande para que destaque */
            margin-bottom: 10px;
        }

        h1 {
            text-align: center;
            color: #0b132b; /* Tono más oscuro parecido a la imagen */
            margin-bottom: 15px;
            font-size: 2em;
            text-transform: uppercase;
            font-weight: 800;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 0.95em;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #2c2c2c;
            box-shadow: 0 0 0 3px rgba(245, 87, 108, 0.1);
        }

        input[type="text"]::placeholder {
            color: #999;
        }

        button {
            background: linear-gradient(135deg, #092fda 0%, #0579ec 100%);
            color: white;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            width: 100%; 
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(51, 51, 51, 0.3);
        }

        button:active {
            transform: translateY(-1px);
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #464646;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: black;
        }

       
        .subtitle {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px; 
        }

        
        .btn-secondary {
            background: transparent;
            color: #0579ec;
            border: 2px solid #0579ec;
        }

        .btn-secondary:hover {
            background: rgba(5, 121, 236, 0.1);
            box-shadow: none;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-icon"><img src="LogoGameHub.png" alt="logo"></div>
        
        <h1>BIENVENIDO A GAMEHUB</h1>
        
        <p class="subtitle">Tu tienda online para comprar los mejores videojuegos a los mejores precios</p>

        <div class="button-group">
            <button onclick="location.href='login.html'">Iniciar sesión</button>
            <button class="btn-secondary" onclick="location.href='register.html'">Registrarse</button>
        </div>
    </div>

</body>
</html>
